<div class="app-layout">
  <nav class="topbar">
    <div class="logo">🎓 <span>TanárApp</span></div>
    <button class="logout-btn" (click)="onLogout()">🚪 Kilépés</button>
  </nav>

  <main class="dashboard">
    <header class="welcome-msg">
      <h1>Szia, Tanuló! 👋</h1>
      <p>Válassz egy feladatot a mai fejlődéshez:</p>
    </header>

    <div class="subject-grid">
      <div class="subject-card" *ngFor="let unit of units" [style.--theme-color]="unit.color">
        <div class="card-header">
          <div class="icon">{{ unit.icon }}</div>
          <h3>{{ unit.title }}</h3>
        </div>

        <div class="info">
          <p>{{ unit.description }}</p>
        </div>

        <button class="action-btn" (click)="startTask(unit.id)">Indítás</button>
      </div>
    </div>
  </main>
</div>
