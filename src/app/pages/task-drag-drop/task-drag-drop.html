<div class="task-layout" *ngIf="currentTask">
  <header class="task-header">
    <button class="back-btn" (click)="goBack()">⬅ Vissza a leckéhez</button>
    <h2>{{ currentTask.title }}</h2>
    <p [innerHTML]="currentTask.instruction"></p>
  </header>

  <div class="drag-drop-container">
    <div class="list-container">
      <h3>Elérhető kifejezések ({{ availableOptions.length }})</h3>
      <div
        cdkDropList
        #availableList="cdkDropList"
        [cdkDropListData]="availableOptions"
        [cdkDropListConnectedTo]="[selectedList]"
        class="item-list"
        (cdkDropListDropped)="drop($event)"
      >
        <div class="item-box" *ngFor="let item of availableOptions" cdkDrag>
          {{ item }}
        </div>
      </div>
    </div>

    <div class="list-container">
      <h3>Kiválasztott ({{ selectedOptions.length }} / {{ currentTask.requiredCount }})</h3>
      <div
        cdkDropList
        #selectedList="cdkDropList"
        [cdkDropListData]="selectedOptions"
        [cdkDropListConnectedTo]="[availableList]"
        class="item-list drop-zone"
        [cdkDropListEnterPredicate]="maxAllowedItems"
        (cdkDropListDropped)="drop($event)"
      >
        <div class="empty-msg" *ngIf="selectedOptions.length === 0">Húzd ide a megoldásokat...</div>

        <div class="item-box selected" *ngFor="let item of selectedOptions" cdkDrag>
          {{ item }}
        </div>
      </div>

      <div class="action-footer">
        <div class="status-message" *ngIf="selectedOptions.length < currentTask.requiredCount">
          <span class="info-icon">ℹ️</span>
          <p>
            Még <strong>{{ currentTask.requiredCount - selectedOptions.length }}</strong> testrészt
            be kell húznod!
          </p>
        </div>

        <button
          class="submit-btn"
          [disabled]="selectedOptions.length !== currentTask.requiredCount"
          (click)="submitTask()"
        >
          Válaszok ellenőrzése <span class="btn-icon">✅</span>
        </button>
      </div>
    </div>
  </div>
</div>
