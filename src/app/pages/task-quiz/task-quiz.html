<div class="task-layout" *ngIf="currentTask">
  <header class="task-header">
    <button class="back-btn" (click)="goBack()">⬅ Vissza a leckékhez</button>
    <h2>{{ currentTask.title }}</h2>
    <p>Válassz a lehetőségek közül!</p>
  </header>

  <div class="quiz-container">
    <div *ngIf="!isQuizFinished" class="quiz-card">
      <div class="progress-info">
        <span>Kérdés {{ currentQuestionIndex + 1 }} / {{ currentTask.questions.length }}</span>
        <div class="progress-bar">
          <div
            class="progress-fill"
            [style.width.%]="((currentQuestionIndex + 1) / currentTask.questions.length) * 100"
          ></div>
        </div>
      </div>

      <h3 class="question-text">{{ currentQuestion.text }}</h3>

      <div class="options-grid">
        <button
          *ngFor="let option of currentQuestion.options; let i = index"
          class="option-btn"
          [class.selected]="selectedOptionIndex === i"
          (click)="selectOption(i)"
        >
          <span class="option-letter">{{ ['A', 'B', 'C'][i] }}</span>
          <span class="option-text">{{ option }}</span>
        </button>
      </div>

      <button class="next-btn" [disabled]="selectedOptionIndex === null" (click)="nextQuestion()">
        {{
          currentQuestionIndex === currentTask.questions.length - 1
            ? 'Befejezés'
            : 'Következő kérdés ➡️'
        }}
      </button>
    </div>

    <div *ngIf="isQuizFinished" class="quiz-card result-card">
      <div class="score-display">
        <span class="points">{{ score }}</span>
        <span class="total">/ {{ currentTask.questions.length }} pont</span>
      </div>
      <button class="home-btn" (click)="goBack()">Vissza</button>
    </div>
  </div>
</div>
